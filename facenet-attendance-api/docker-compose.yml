version: '3.8'

services:
  facenet-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: facenet-attendance-api
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      DB_DRIVER: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: dg_construct_monitor
      DB_USER: root
      DB_PASSWORD: root
      API_PORT: 5000
      LOG_LEVEL: INFO
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      - mysql
    networks:
      - facenet-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: facenet-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dg_construct_monitor
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - facenet-network
    restart: unless-stopped

networks:
  facenet-network:
    driver: bridge

volumes:
  mysql_data:
